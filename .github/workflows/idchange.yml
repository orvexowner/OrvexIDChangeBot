name: Apply ID Change
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'CPM Email'
        required: true
      password:
        description: 'CPM Password'
        required: true
      new_id:
        description: 'New Player ID'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Apply ID Change
        run: python apply_id.py "${{ github.event.inputs.email }}" "${{ github.event.inputs.password }}" "${{ github.event.inputs.new_id }}"
      - name: Notify Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ github.event.inputs.chat_id }}" \
          -d text="✅ ID Changed successfully! Enjoy! - @OrvexOwner"
